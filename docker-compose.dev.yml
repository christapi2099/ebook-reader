services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ebook-tts-backend-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads_dev:/app/uploads
      - backend_data_dev:/data
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/data/ebook_reader.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ebook-net-dev

  frontend:
    image: node:22-alpine
    container_name: ebook-tts-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - ebook-net-dev

networks:
  ebook-net-dev:
    driver: bridge

volumes:
  backend_uploads_dev:
  backend_data_dev:
